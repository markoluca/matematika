<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Принцезина Магична Школа Бројева</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
display:flex;
justify-content:center;
padding:20px;
color:#b00020;
}

.app{
background:white;
max-width:1000px;
width:100%;
border-radius:30px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
text-align:center;
font-weight:bold;
}

h1{
font-size:28px;
color:#d00000;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.level-map{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.level{
background:#ffe5ec;
padding:20px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.level.locked{
background:#ddd;
color:#888;
cursor:not-allowed;
}

.level:hover{
transform:scale(1.05);
}

input{
padding:12px;
font-size:18px;
border-radius:15px;
border:3px solid #ff4d6d;
width:260px;
text-align:center;
margin-top:10px;
}

button{
background:#d00000;
color:white;
border:none;
padding:12px 20px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.question{
font-size:22px;
margin:20px 0;
min-height:60px;
}

.feedback{
font-size:22px;
margin-top:10px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
}

.result{
margin-top:20px;
font-size:22px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:26px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

.medal{
font-size:40px;
margin-top:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="app">

<h1>👑 ПРИНЦЕЗИНА МАГИЧНА ШКОЛА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ СВОЈЕ ИМЕ">
<br>

<div id="map" class="level-map">

<div class="level" onclick="startLevel(1)">
🌸 НИВО 1<br> БРОЈЕВИ
</div>

<div class="level locked" id="level2">
💖 НИВО 2<br> ПАРНИ И НЕПАРНИ
</div>

<div class="level locked" id="level3">
🎀 НИВО 3<br> НИЗОВИ
</div>

<div class="level locked" id="level4">
👑 НИВО 4<br> ТЕКСТУАЛНИ
</div>

<div class="level locked" id="level5">
🏆 НИВО 5<br> КОНТРОЛНИ ТЕСТ
</div>

</div>

<div id="gameArea" class="hidden">

<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="checkAnswer()">ПРОВЕРИ</button>

<div id="feedback" class="feedback"></div>

<div class="stats">
ТАЧНО: <span id="correctCount">0</span> |
ПОГРЕШНО: <span id="wrongCount">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div class="result" id="result"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
