<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 Магична Башта Бројева PRO</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif; /* ŠTAMPANA SLOVA */
background:linear-gradient(135deg,#ff4d6d,#ff758f);
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.app{
background:white;
color:#b00020;
max-width:1000px;
width:100%;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:30px;
text-align:center;
font-weight:bold; /* SVE BOLD */
}

h1{
color:#d00000;
font-size:28px;
font-weight:900;
}

input{
padding:12px;
font-size:20px;
border-radius:15px;
border:3px solid #ff4d6d;
text-align:center;
width:280px;
font-weight:bold;
}

button{
background:#d00000;
color:white;
border:none;
padding:14px 22px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.question{
font-size:22px;   /* VEĆA SLOVA */
margin:25px 0;
min-height:70px;
font-weight:900;  /* JAKO BOLD */
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
font-size:18px;
font-weight:bold;
}

.progress{
height:18px;
background:#ffd6de;
border-radius:20px;
overflow:hidden;
margin-top:12px;
}

.bar{
height:18px;
background:#d00000;
width:0%;
transition:0.4s;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:900;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:26px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

@media (max-width:600px){

.question{
font-size:20px;
}

input{
width:90%;
font-size:20px;
}

button{
width:90%;
font-size:18px;
}

}

</style>
</head>
<body>

<!-- Ostatak JavaScript koda ostaje ISTI kao u tvojoj PRO verziji -->

</body>
</html>
