<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Магична школа бројева</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:900px;
width:100%;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
font-weight:bold;
color:#b00020;
}

h1{
font-size:26px;
margin-bottom:20px;
}

input{
padding:12px;
font-size:20px;
border-radius:15px;
border:3px solid #ff4d6d;
width:280px;
text-align:center;
font-weight:bold;
}

button{
background:#d00000;
color:white;
border:none;
padding:14px 22px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.question{
font-size:22px;
margin:25px 0;
min-height:70px;
}

.feedback{
font-size:22px;
margin-top:10px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
font-size:18px;
}

.result{
margin-top:25px;
font-size:22px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:28px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="app">

<h1>👑 МАГИЧНА ШКОЛА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ ИМЕ">
<br>
<button onclick="startGame()">ПОЧНИ ТЕСТ (30 ПИТАЊА)</button>

<div id="gameArea" style="display:none;">

<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="checkAnswer()">ПРОВЕРИ</button>

<div id="feedback" class="feedback"></div>

<div class="stats">
ТАЧНО: <span id="correctCount">0</span> |
ПОГРЕШНО: <span id="wrongCount">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>

let allQuestions=[];
let questions=[];
let index=0;
let score=0;
let wrong=0;
let lastType="";

// LATINICA → ĆIRILICA
function normalize(text){
text=text.toLowerCase().trim();

const map={
"a":"а","b":"б","c":"ц","č":"ч","ć":"ћ",
"d":"д","đ":"ђ","e":"е","f":"ф",
"g":"г","h":"х","i":"и","j":"ј",
"k":"к","l":"л","m":"м","n":"н",
"o":"о","p":"п","r":"р","s":"с",
"š":"ш","t":"т","u":"у","v":"в",
"z":"з","ž":"ж"
};

let result="";
for(let char of text){
result+=map[char]||char;
}
return result.replace(/\s+/g,"");
}

// sortiranje nizova
function normalizeList(text){
return text.replace(/\s/g,"")
.split(",")
.filter(n=>n!=="")
.sort()
.join(",");
}

function smartCheck(user,correct){

if(correct.includes(",")){
return normalizeList(user)===normalizeList(correct);
}

if(!isNaN(correct)){
return Number(user)===Number(correct);
}

return normalize(user)===normalize(correct);
}

function addQuestion(type,q,a){
allQuestions.push({type,q,a});
}

function buildDatabase(){

allQuestions=[];

/* 1 PISANJE CIFRAMA */
addQuestion("cifra","НАПИШИ ЦИФРАМА: ДЕВЕТНАЕСТ","19");
addQuestion("cifra","НАПИШИ ЦИФРАМА: ЧЕТРНАЕСТ","14");
addQuestion("cifra","НАПИШИ ЦИФРАМА: ОСАМНАЕСТ","18");

/* 2 REČIMA */
addQuestion("rec","НАПИШИ РЕЧИМА БРОЈ 16","шеснаест");
addQuestion("rec","НАПИШИ РЕЧИМА БРОЈ 12","дванаест");
addQuestion("rec","НАПИШИ РЕЧИМА БРОЈ 19","деветнаест");

/* 3 DESETICE JEDINICE */
addQuestion("dj","КОЛИКО ЈЕДИНИЦА ИМА БРОЈ 13?","3");
addQuestion("dj","КОЛИКО ЈЕДИНИЦА ИМА БРОЈ 20?","0");
addQuestion("dj","КОЛИКО ДЕСЕТИЦА ИМА БРОЈ 20?","2");

/* 4 PARNE NEPARNE */
addQuestion("par","НАПИШИ СВЕ ПАРНЕ БРОЈЕВЕ ВЕЋЕ ОД 8 А МАЊЕ ОД 18","10,12,14,16");
addQuestion("par","НАПИШИ СВЕ НЕПАРНЕ БРОЈЕВЕ ИЗМЕЂУ 10 И 20","11,13,15,17,19");
addQuestion("par","НАПИШИ СВЕ ПАРНЕ БРОЈЕВЕ ПРВЕ ДЕСЕТИЦЕ","2,4,6,8,10");

/* 5 PRETHODNIK */
addQuestion("pre","НЕПАРНИ ПРЕТХОДНИК БРОЈА 19","17");
addQuestion("pre","ПАРНИ СЛЕДБЕНИК БРОЈА 19","20");
addQuestion("pre","ПРЕТХОДНИК БРОЈА 13","12");

/* 6 ZNAK */
addQuestion("znak","УПИШИ ЗНАК: 18 __ 20","<");
addQuestion("znak","УПИШИ ЗНАК: 17 __ 1Д7Ј","=");
addQuestion("znak","УПИШИ ЗНАК: 2Д __ 15Ј",">");

/* 7 NAJVEĆI NAJMANJI */
addQuestion("max","НАЈВЕЋИ НЕПАРНИ БРОЈ ДРУГЕ ДЕСЕТИЦЕ","19");
addQuestion("max","НАЈМАЊИ ПАРНИ БРОЈ ПРВЕ ДЕСЕТИЦЕ","2");
addQuestion("max","НАЈМАЊИ НЕПАРНИ ДВОЦИФРЕНИ БРОЈ","11");

/* 8 NIZ */
addQuestion("niz","НАСТАВИ НИЗ: 2,4,6,__,__","8,10");
addQuestion("niz","НАСТАВИ НИЗ: 19,17,15,__,__","13,11");
addQuestion("niz","НАСТАВИ НИЗ ПАРНИХ БРОЈЕВА ДРУГЕ ДЕСЕТИЦЕ ОД 12","12,14,16,18,20");

/* 9 ODUZIMANJE */
addQuestion("oduz","АНА ЈЕ ИМАЛА 18 ЈАБУКА. ПОЈЕЛА ЈЕ 6. КОЛИКО ЈЕ ОСТАЛО?","12");
addQuestion("oduz","МИЛИЦА ЈЕ ИМАЛА 15 БОМБОНА. ДАЛА ЈЕ 7. КОЛИКО ЈОЈ ЈЕ ОСТАЛО?","8");
addQuestion("oduz","ПЕТАР ЈЕ ИМАО 20 ЛОПТИ. ИЗГУБИО ЈЕ 9. КОЛИКО МУ ЈЕ ОСТАЛО?","11");

}

function generateTest(){

questions=[];
let shuffled=[...allQuestions].sort(()=>Math.random()-0.5);

for(let q of shuffled){
if(questions.length===30) break;
if(q.type!==lastType){
questions.push(q);
lastType=q.type;
}
}

while(questions.length<30){
questions.push(shuffled[Math.floor(Math.random()*shuffled.length)]);
}

}

function startGame(){

let name=document.getElementById("studentName").value;
if(!name){alert("УНЕСИ ИМЕ");return;}

index=0;
score=0;
wrong=0;

buildDatabase();
generateTest();

document.getElementById("gameArea").style.display="block";
show();
}

function show(){
document.getElementById("question").innerText=
"ПИТАЊЕ "+(index+1)+" ОД 30: "+questions[index].q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
}

function checkAnswer(){

let user=document.getElementById("answer").value;
if(user.trim()==""){alert("УНЕСИ ОДГОВОР");return;}

let correct=questions[index].a;

if(smartCheck(user,correct)){
score++;
document.getElementById("feedback").innerText="ТАЧНО 💖";
hearts();
}else{
wrong++;
document.getElementById("feedback").innerText="НЕТАЧНО ❌";
}

updateStats();

index++;

if(index<30){
setTimeout(show,800);
}else{
finish();
}
}

function hearts(){
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}
}

function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function finish(){

let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="ТЕСТ ЈЕ ЗАВРШЕН!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
"🌸 РЕЗУЛТАТ 🌸<br><br>"+
"ТАЧНО: "+score+" ОД 30<br>"+
"ПРОЦЕНАТ: "+percent+"%<br>"+
"ОЦЕНА: "+grade;
}

</script>

</body>
</html>
