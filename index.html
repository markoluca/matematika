<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Магична Башта Бројева</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#ff4d6d;
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:800px;
width:100%;
border-radius:20px;
padding:25px;
text-align:center;
font-weight:bold;
}

h1{font-size:26px;}

input{
padding:10px;
font-size:18px;
width:80%;
margin-top:10px;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.question{
margin:20px 0;
font-size:20px;
}

.result{
margin-top:20px;
font-size:20px;
}
</style>
</head>

<body>

<div class="app">

<h1>МАГИЧНА БАШТА БРОЈЕВА</h1>

<input id="studentName" placeholder="УНЕСИ ИМЕ">
<br>
<button onclick="startTest()">ПОЧНИ</button>

<div id="game" style="display:none;">
<div class="question" id="question"></div>
<input id="answer">
<br>
<button onclick="check()">ПРОВЕРИ</button>
<div id="feedback"></div>
<div class="result" id="result"></div>
</div>

</div>

<script>

let questions=[];
let index=0;
let score=0;

// ===== LATINICA → ĆIRILICA =====
function normalize(text){
text=text.toLowerCase().trim();

const map={
"a":"а","b":"б","c":"ц","č":"ч","ć":"ћ",
"d":"д","đ":"ђ","e":"е","f":"ф",
"g":"г","h":"х","i":"и","j":"ј",
"k":"к","l":"л","m":"м","n":"н",
"o":"о","p":"п","r":"р","s":"с",
"š":"ш","t":"т","u":"у","v":"в",
"z":"з","ž":"ж"
};

let result="";
for(let char of text){
result+=map[char]||char;
}
return result.replace(/\s+/g,"");
}

// ===== GENERATOR 30 PITANJA =====
function generate(){

questions=[];

for(let i=0;i<10;i++){
let n=Math.floor(Math.random()*10)+10;
questions.push({
q:"КОЛИКО ЈЕДИНИЦА ИМА БРОЈ "+n+"?",
a:(n%10).toString()
});
}

for(let i=0;i<10;i++){
let a=Math.floor(Math.random()*10)+5;
let b=Math.floor(Math.random()*10)+1;
questions.push({
q:"ИЗРАЧУНАЈ "+a+" + "+b,
a:(a+b).toString()
});
}

for(let i=0;i<10;i++){
let n=Math.floor(Math.random()*20)+1;
questions.push({
q:"ДА ЛИ ЈЕ БРОЈ "+n+" ПАРАН? (ДА/НЕ)",
a:(n%2==0)?"да":"не"
});
}

// izmešaj
questions.sort(()=>Math.random()-0.5);
}

function startTest(){
let name=document.getElementById("studentName").value;
if(!name){
alert("УНЕСИ ИМЕ");
return;
}
generate();
document.getElementById("game").style.display="block";
show();
}

function show(){
document.getElementById("question").innerText=
"ПИТАЊЕ "+(index+1)+" ОД 30: "+questions[index].q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
}

function check(){

let user=document.getElementById("answer").value;
if(user.trim()==""){
alert("УНЕСИ ОДГОВОР");
return;
}

let correct=questions[index].a;

let ok=false;

// broj
if(!isNaN(correct)){
ok = Number(user) === Number(correct);
}
else{
ok = normalize(user) === normalize(correct);
}

if(ok){
score++;
document.getElementById("feedback").innerText="ТАЧНО";
}else{
document.getElementById("feedback").innerText="НЕТАЧНО";
}

index++;

if(index<30){
setTimeout(show,600);
}else{
finish();
}
}

function finish(){
let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("result").innerHTML=
"ТАЧНО: "+score+" ОД 30<br>"+
"ПРОЦЕНАТ: "+percent+"%<br>"+
"ОЦЕНА: "+grade;
}

</script>

</body>
</html>
