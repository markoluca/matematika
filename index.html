<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Магична Школа Бројева</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:850px;
width:100%;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
font-weight:bold;
color:#b00020;
}

h1{
font-size:28px;
color:#d00000;
}

input{
padding:12px;
font-size:20px;
border-radius:15px;
border:3px solid #ff4d6d;
width:280px;
text-align:center;
font-weight:bold;
}

button{
background:#d00000;
color:white;
border:none;
padding:14px 22px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.question{
font-size:22px;
margin:25px 0;
min-height:60px;
}

.feedback{
font-size:22px;
margin-top:10px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
font-size:18px;
}

.result{
margin-top:25px;
font-size:22px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:28px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

@media (max-width:600px){
.question{font-size:20px;}
input{width:95%;}
button{width:95%;}
}

</style>
</head>

<body>

<div class="app">

<h1>👑 МАГИЧНА ШКОЛА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ СВОЈЕ ИМЕ">
<br>
<button onclick="startGame()">ПОЧНИ ТЕСТ (30 ПИТАЊА)</button>

<div id="gameArea" style="display:none;">

<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="nextQuestion()">ПРОВЕРИ</button>

<div id="feedback" class="feedback"></div>

<div class="stats">
ТАЧНО: <span id="correctCount">0</span> |
ПОГРЕШНО: <span id="wrongCount">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>

let questions=[];
let index=0;
let score=0;
let wrong=0;

// ===== LATINICA → ĆIRILICA =====
function normalize(text){
text=text.toLowerCase().trim();

const map={
"a":"а","b":"б","c":"ц","č":"ч","ć":"ћ",
"d":"д","đ":"ђ","e":"е","f":"ф",
"g":"г","h":"х","i":"и","j":"ј",
"k":"к","l":"л","m":"м","n":"н",
"o":"о","p":"п","r":"р","s":"с",
"š":"ш","t":"т","u":"у","v":"в",
"z":"з","ž":"ж"
};

let result="";
for(let char of text){
result+=map[char]||char;
}
return result.replace(/\s+/g,"");
}

// ===== GENERATOR 30 PITANJA =====
function generate(){
questions=[];

for(let i=0;i<10;i++){
let n=Math.floor(Math.random()*10)+10;
questions.push({
q:"КОЛИКО ЈЕДИНИЦА ИМА БРОЈ "+n+"?",
a:(n%10).toString()
});
}

for(let i=0;i<10;i++){
let a=Math.floor(Math.random()*10)+5;
let b=Math.floor(Math.random()*10)+1;
questions.push({
q:"ИЗРАЧУНАЈ "+a+" + "+b,
a:(a+b).toString()
});
}

for(let i=0;i<10;i++){
let n=Math.floor(Math.random()*20)+1;
questions.push({
q:"ДА ЛИ ЈЕ БРОЈ "+n+" ПАРАН? (ДА/НЕ)",
a:(n%2==0)?"да":"не"
});
}

questions.sort(()=>Math.random()-0.5);
}

function startGame(){
let name=document.getElementById("studentName").value;
if(!name){
alert("УНЕСИ ИМЕ");
return;
}
generate();
document.getElementById("gameArea").style.display="block";
show();
}

function show(){
document.getElementById("question").innerText=
"ПИТАЊЕ "+(index+1)+" ОД 30: "+questions[index].q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
}

function nextQuestion(){

let user=document.getElementById("answer").value;
if(user.trim()==""){
alert("УНЕСИ ОДГОВОР");
return;
}

let correct=questions[index].a;
let ok=false;

// broj
if(!isNaN(correct)){
ok = Number(user) === Number(correct);
}
else{
ok = normalize(user) === normalize(correct);
}

if(ok){
score++;
document.getElementById("feedback").innerText="ТАЧНО 💖";
heartsEffect();
}else{
wrong++;
document.getElementById("feedback").innerText="НЕТАЧНО ❌";
}

updateStats();

index++;

if(index<30){
setTimeout(show,800);
}else{
finish();
}
}

function heartsEffect(){
for(let i=0;i<20;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),3000);
}
}

function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function finish(){
let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="ТЕСТ ЈЕ ЗАВРШЕН!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
"🌸 РЕЗУЛТАТ 🌸<br><br>"+
"ТАЧНО: "+score+" ОД 30<br>"+
"ПРОЦЕНАТ: "+percent+"%<br>"+
"ОЦЕНА: "+grade;
}

</script>

</body>
</html>
