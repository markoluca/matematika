<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 Магична Башта Бројева</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.app{
background:white;
color:#b00020;
max-width:950px;
width:100%;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:30px;
text-align:center;
}

h1{color:#d00000;}

input{
padding:10px;
font-size:18px;
border-radius:15px;
border:2px solid #ff4d6d;
text-align:center;
width:260px;
}

button{
background:#d00000;
color:white;
border:none;
padding:12px 20px;
border-radius:15px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.question{
font-size:20px;
margin:20px 0;
min-height:60px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:12px;
border-radius:15px;
font-size:16px;
}

.progress{
height:15px;
background:#ffd6de;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:15px;
background:#d00000;
width:0%;
transition:0.4s;
}

.result{
margin-top:20px;
font-size:20px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="app">

<h1>👑 Магична Башта Бројева 🌹</h1>

<input id="studentName" placeholder="Унеси своје име">
<br>
<button onclick="startGame()">Почни тест (30 питања)</button>

<div id="gameArea" style="display:none;">
<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="nextQuestion()">Провери</button>

<div id="feedback"></div>

<div class="stats">
Тачно: <span id="correctCount">0</span> |
Погрешно: <span id="wrongCount">0</span> |
Проценат: <span id="percent">0</span>%
</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>
</div>

</div>

<script>

let questions=[];
let current=0;
let score=0;
let wrong=0;
let student="";

// ================= LATINICA → ĆIRILICA =================
function normalize(text){
text = text.toLowerCase().trim();

const map = {
"a":"а","b":"б","c":"ц","č":"ч","ć":"ћ",
"d":"д","đ":"ђ","e":"е","f":"ф",
"g":"г","h":"х","i":"и","j":"ј",
"k":"к","l":"л","m":"м","n":"н",
"o":"о","p":"п","r":"р","s":"с",
"š":"ш","t":"т","u":"у","v":"в",
"z":"з","ž":"ж"
};

let result="";
for(let char of text){
result += map[char] || char;
}

return result.replace(/\s+/g,"");
}

// ================= PARSIRANJE NIZA =================
function parseNumbers(text){
return text
.replace(/\s/g,"")
.split(",")
.map(n=>n.trim())
.filter(n=>n!=="")
.sort()
.join(",");
}

// ================= START =================
function startGame(){
student=document.getElementById("studentName").value;
if(!student) return alert("Унеси име!");

generateQuestions();
shuffleQuestions();

document.getElementById("gameArea").style.display="block";
showQuestion();
}

// ================= 30 PITANJA =================
function generateQuestions(){
questions=[
{q:"Напиши цифрама број деветнаест",a:"19"},
{q:"Напиши цифрама број дванаест",a:"12"},
{q:"Напиши цифрама број осам",a:"8"},
{q:"Напиши цифрама број четрнаест",a:"14"},
{q:"Који број има 1Д 0Ј?",a:"10"},
{q:"Који број има 1Д 5Ј?",a:"15"},
{q:"Који број има 0Д 5Ј?",a:"5"},
{q:"Наброј непарне бројеве између 12 и 20",a:"13,15,17,19"},
{q:"Наброј парне бројеве веће од 8 а мање од 18",a:"10,12,14,16"},
{q:"Упореди 18 __ 20",a:"<"},
{q:"Упореди 2Д __ 1Д 5Ј",a:">"},
{q:"Парни број мањи од 14 а већи од 10",a:"12"},
{q:"Непарни претходник броја 19",a:"17"},
{q:"Израчунај 10Ј + 6Ј",a:"16"},
{q:"Израчунај 15 - 5",a:"10"},
{q:"Допуни: 5, 6, __ , 8",a:"7"},
{q:"Наброј парне бројеве прве десетице",a:"2,4,6,8,10"},
{q:"Наброј непарне бројеве друге десетице",a:"11,13,15,17,19"},
{q:"Да ли је 14 паран? (да/не)",a:"да"},
{q:"Да ли је 15 паран? (да/не)",a:"не"},
{q:"Напиши речима број 16",a:"шеснаест"},
{q:"Напиши речима број 12",a:"дванаест"},
{q:"Поређај 5, 14, 3 од најмањег",a:"3,5,14"},
{q:"Израчунај збир прва три непарна броја",a:"9"},
{q:"Колико десетица има број 20?",a:"2"},
{q:"Колико јединица има број 11?",a:"1"},
{q:"Највећи непарни број друге десетице",a:"19"},
{q:"Највећи парни једноцифрени број",a:"8"},
{q:"Наброј све непарне бројеве до 10",a:"1,3,5,7,9"},
{q:"Наброј све парне бројеве до 10",a:"2,4,6,8,10"}
];
}

function shuffleQuestions(){
questions.sort(()=>Math.random()-0.5);
}

function showQuestion(){
document.getElementById("question").innerText=
"Питање "+(current+1)+" од 30: "+questions[current].q;

document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
updateProgress();
}

// ================= PROVERA =================
function nextQuestion(){

let user=document.getElementById("answer").value;
if(user.trim()==""){
alert("Мораш одговорити!");
return;
}

let correctAnswer=questions[current].a;
let isCorrect=false;

if(correctAnswer.includes(",")){
if(parseNumbers(user)==parseNumbers(correctAnswer)){
isCorrect=true;
}
}else{
if(normalize(user)==normalize(correctAnswer)){
isCorrect=true;
}
}

if(isCorrect){
score++;
document.getElementById("feedback").innerText="Тачно ✅";
heartsEffect();
}else{
wrong++;
document.getElementById("feedback").innerText="Нетаčno ❌";
}

updateStats();

current++;

if(current<questions.length){
setTimeout(showQuestion,800);
}else{
finishTest();
}
}

// ================= SRCA =================
function heartsEffect(){
for(let i=0;i<15;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),3000);
}
}

// ================= STATISTIKA =================
function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function updateProgress(){
document.getElementById("progressBar").style.width=
((current/30)*100)+"%";
}

// ================= KRAJ =================
function finishTest(){
let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="Тест је завршен!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
`
🌸 ${student} 🌸<br>
Тачно: ${score} од 30<br>
Проценат: ${percent}%<br>
Оцена: ${grade}
`;
}
</script>

</body>
</html>
