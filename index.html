<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 Магична Башта Бројева PRO</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.app{
background:white;
color:#b00020;
max-width:1000px;
width:100%;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:30px;
text-align:center;
font-weight:bold;
}

h1{
color:#d00000;
font-size:30px;
font-weight:900;
}

input{
padding:14px;
font-size:20px;
border-radius:15px;
border:3px solid #ff4d6d;
text-align:center;
width:300px;
font-weight:bold;
}

button{
background:#d00000;
color:white;
border:none;
padding:14px 24px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.question{
font-size:24px;
margin:25px 0;
min-height:70px;
font-weight:900;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
font-size:18px;
}

.progress{
height:20px;
background:#ffd6de;
border-radius:20px;
overflow:hidden;
margin-top:12px;
}

.bar{
height:20px;
background:#d00000;
width:0%;
transition:0.4s;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:900;
}

.feedback{
font-size:20px;
margin-top:10px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:26px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

@media (max-width:600px){
.question{font-size:20px;}
input{width:95%;}
button{width:95%;}
}

</style>
</head>

<body>

<div class="app">

<h1>👑 МАГИЧНА БАШТА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ СВОЈЕ ИМЕ">
<br>
<button onclick="startGame()">ПОЧНИ ТЕСТ (30 ПИТАЊА)</button>

<div id="gameArea" style="display:none;">

<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="nextQuestion()">ПРОВЕРИ</button>

<div id="feedback" class="feedback"></div>

<div class="stats">
ТАЧНО: <span id="correctCount">0</span> |
ПОГРЕШНО: <span id="wrongCount">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>

let questions=[];
let current=0;
let score=0;
let wrong=0;

// ===== NORMALIZACIJA =====
function normalize(text){
text=text.toLowerCase().trim();

const map={
"a":"а","b":"б","c":"ц","č":"ч","ć":"ћ",
"d":"д","đ":"ђ","e":"е","f":"ф",
"g":"г","h":"х","i":"и","j":"ј",
"k":"к","l":"л","m":"м","n":"н",
"o":"о","p":"п","r":"р","s":"с",
"š":"ш","t":"т","u":"у","v":"в",
"z":"з","ž":"ж"
};

let result="";
for(let char of text){
result+=map[char]||char;
}
return result.replace(/\s+/g,"");
}

function parseNumbers(text){
return text.replace(/\s/g,"")
.split(",")
.map(n=>n.trim())
.filter(n=>n!=="")
.sort()
.join(",");
}

function smartCheck(user,correct){

if(correct.includes(",")){
return parseNumbers(user)==parseNumbers(correct);
}

if(!isNaN(correct)){
return Number(user)==Number(correct);
}

return normalize(user)==normalize(correct);
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generateTest(){

let pool=[];

// CIFRE
let words=[
["ЈЕДАНАЕСТ",11],["ДВАНАЕСТ",12],["ТРИНАЕСТ",13],
["ЧЕТРНАЕСТ",14],["ПЕТНАЕСТ",15],
["ШЕСНАЕСТ",16],["СЕДАМНАЕСТ",17],
["ОСАМНАЕСТ",18],["ДЕВЕТНАЕСТ",19]
];

for(let i=0;i<6;i++){
let w=words[rand(0,words.length-1)];
pool.push({q:"НАПИШИ ЦИФРАМА БРОЈ "+w[0],a:w[1].toString()});
}

// PARNI
for(let i=0;i<6;i++){
let n=rand(5,20);
pool.push({
q:"ДА ЛИ ЈЕ БРОЈ "+n+" ПАРАН? (ДА/НЕ)",
a:(n%2==0)?"да":"не"
});
}

// JEDINICE / DESETICE
for(let i=0;i<6;i++){
let n=rand(11,20);
pool.push({
q:"КОЛИКО ЈЕДИНИЦА ИМА БРОЈ "+n+"?",
a:(n%10).toString()
});
pool.push({
q:"КОЛИКО ДЕСЕТИЦА ИМА БРОЈ "+n+"?",
a:Math.floor(n/10).toString()
});
}

// RAČUN
for(let i=0;i<6;i++){
let a=rand(5,15);
let b=rand(1,10);
pool.push({
q:"ИЗРАЧУНАЈ "+a+" + "+b,
a:(a+b).toString()
});
}

pool.sort(()=>Math.random()-0.5);
questions=pool.slice(0,30);
}

function startGame(){
if(!document.getElementById("studentName").value){
alert("УНЕСИ ИМЕ!");
return;
}
generateTest();
document.getElementById("gameArea").style.display="block";
showQuestion();
}

function showQuestion(){
document.getElementById("question").innerText=
"ПИТАЊЕ "+(current+1)+" ОД 30: "+questions[current].q;

document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
updateProgress();
}

function nextQuestion(){

let user=document.getElementById("answer").value;
if(user.trim()==""){
alert("МОРАШ ОДГОВОРИТИ!");
return;
}

let correctAnswer=questions[current].a;

if(smartCheck(user,correctAnswer)){
score++;
document.getElementById("feedback").innerText="ТАЧНО ✅";
heartsEffect();
}else{
wrong++;
document.getElementById("feedback").innerText="НЕТАЧНО ❌";
}

updateStats();
current++;

if(current<30){
setTimeout(showQuestion,800);
}else{
finishTest();
}
}

function heartsEffect(){
for(let i=0;i<15;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),3000);
}
}

function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function updateProgress(){
document.getElementById("progressBar").style.width=
((current/30)*100)+"%";
}

function finishTest(){
let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="ТЕСТ ЈЕ ЗАВРШЕН!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
`
🌸 РЕЗУЛТАТ 🌸<br>
ТАЧНО: ${score} ОД 30<br>
ПРОЦЕНАТ: ${percent}%<br>
ОЦЕНА: ${grade}
`;
}

</script>
</body>
</html>
