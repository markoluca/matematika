<!DOCTYPE html>
<script>
alert("РАДИ 👑");
</script>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Принцезина школа бројева</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#d00000);
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
width:100%;
max-width:950px;
border-radius:25px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
text-align:center;
font-weight:bold;
}

h1{ color:#d00000; }

.level-map{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.level{
background:#ffe5ec;
padding:20px;
border-radius:20px;
cursor:pointer;
}

.level.locked{
background:#ddd;
color:#777;
cursor:not-allowed;
}

.hidden{ display:none; }

.question{
font-size:20px;
margin:20px 0;
min-height:60px;
}

input{
padding:12px;
font-size:20px;
border-radius:12px;
border:3px solid #ff4d6d;
width:280px;
text-align:center;
font-weight:bold;
}

#keyboardContainer{
margin-top:20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.keyBtn{
background:#ff4d6d;
color:white;
border:none;
padding:10px 14px;
border-radius:12px;
font-size:18px;
cursor:pointer;
min-width:45px;
}

.signBtn{
background:#d00000;
color:white;
border:none;
padding:20px 30px;
border-radius:20px;
font-size:32px;
font-weight:bold;
cursor:pointer;
min-width:80px;
transition:0.2s;
}

.signBtn:active{
transform:scale(0.9);
background:#a00000;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:10px;
border-radius:12px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="app">

<h1>👑 ПРИНЦЕЗИНА ШКОЛА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ ИМЕ">

<div id="map" class="level-map">
<div class="level" id="level1">🌸 НИВО 1</div>
<div class="level locked" id="level2">💖 НИВО 2</div>
<div class="level locked" id="level3">🎀 НИВО 3</div>
<div class="level locked" id="level4">👑 НИВО 4</div>
<div class="level locked" id="level5">🏆 НИВО 5</div>
</div>

<div id="gameArea" class="hidden">

<div class="question" id="question"></div>

<input id="answer" readonly>

<div id="keyboardContainer"></div>

<div class="stats">
ТАЧНО: <span id="correct">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div id="result"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
