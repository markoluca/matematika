<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 Магична школа бројева</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff4d6d,#ff1e56);
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:900px;
width:100%;
border-radius:25px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
font-weight:bold;
color:#b00020;
}

h1{font-size:26px;}

input{
padding:12px;
font-size:20px;
border-radius:15px;
border:3px solid #ff4d6d;
width:280px;
text-align:center;
font-weight:bold;
}

button{
background:#d00000;
color:white;
border:none;
padding:14px 22px;
border-radius:15px;
font-size:18px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.question{
font-size:22px;
margin:25px 0;
min-height:70px;
}

.feedback{
font-size:22px;
margin-top:10px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:15px;
border-radius:15px;
font-size:18px;
}

.result{
margin-top:25px;
font-size:22px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:28px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="app">

<h1>👑 МАГИЧНА ШКОЛА БРОЈЕВА 🌹</h1>

<input id="studentName" placeholder="УНЕСИ ИМЕ">
<br>
<button onclick="startGame()">ПОЧНИ ТЕСТ (30 ПИТАЊА)</button>

<div id="gameArea" style="display:none;">

<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="checkAnswer()">ПРОВЕРИ</button>

<div id="feedback" class="feedback"></div>

<div class="stats">
ТАЧНО: <span id="correctCount">0</span> |
ПОГРЕШНО: <span id="wrongCount">0</span> |
ПРОЦЕНАТ: <span id="percent">0</span>%
</div>

<div class="result" id="result"></div>

</div>
</div>

<script>

let questions=[];
let index=0;
let score=0;
let wrong=0;

function normalize(text){
text=text.toLowerCase().trim();
return text.replace(/\s+/g,"");
}

function normalizeList(text){
return text.replace(/\s/g,"")
.split(",")
.filter(n=>n!=="")
.map(Number)
.sort((a,b)=>a-b);
}

function isValidSubset(userArr,correctArr){

for(let n of userArr){
if(!correctArr.includes(n)) return false;
}

return userArr.length>0;
}

function smartCheck(user,correct,type){

if(type==="oduz"){

let cleaned=user.replace(/\s+/g,"");
cleaned=cleaned.replace("–","-");

let match=cleaned.match(/^(\d+)-(\d+)=(\d+)$/);
if(!match) return false;

let a=parseInt(match[1]);
let b=parseInt(match[2]);
let result=parseInt(match[3]);

return (a-b===result) && (result==correct);
}

if(type==="subset"){
let userArr=normalizeList(user);
let correctArr=normalizeList(correct);
return isValidSubset(userArr,correctArr);
}

if(correct.includes(",")){
return JSON.stringify(normalizeList(user))===JSON.stringify(normalizeList(correct));
}

if(!isNaN(correct)){
return Number(user)===Number(correct);
}

return normalize(user)===normalize(correct);
}

function buildQuestions(){

questions=[];

/* PARNE OD 12 DO 20 - dozvoljen podniz */
questions.push({
q:"НАПИШИ СВЕ ПАРНЕ БРОЈЕВЕ ОД 12 ДО 20",
a:"12,14,16,18,20",
type:"subset"
});

/* NEPARNE OD 11 DO 19 */
questions.push({
q:"НАПИШИ СВЕ НЕПАРНЕ БРОЈЕВЕ ОД 11 ДО 19",
a:"11,13,15,17,19",
type:"subset"
});

/* ODUZIMANJE */
questions.push({
q:"АНА ЈЕ ИМАЛА 18 ЈАБУКА. ПОЈЕЛА ЈЕ 6. НАПИШИ ЦЕО ПОСТУПАК.",
a:12,
type:"oduz"
});

questions.push({
q:"МИЛИЦА ЈЕ ИМАЛА 15 БОМБОНА. ДАЛА ЈЕ 7. НАПИШИ ЦЕО ПОСТУПАК.",
a:8,
type:"oduz"
});

/* KLASIČNI */
questions.push({
q:"КОЛИКО ЈЕДИНИЦА ИМА БРОЈ 20?",
a:"0",
type:"normal"
});

questions.push({
q:"НАЈВЕЋИ НЕПАРНИ БРОЈ ДРУГЕ ДЕСЕТИЦЕ",
a:"19",
type:"normal"
});

while(questions.length<30){
questions=questions.concat(questions);
}

questions=questions.slice(0,30);
questions.sort(()=>Math.random()-0.5);

}

function startGame(){

let name=document.getElementById("studentName").value;
if(!name){alert("УНЕСИ ИМЕ");return;}

index=0;
score=0;
wrong=0;

buildQuestions();

document.getElementById("gameArea").style.display="block";
show();
}

function show(){
document.getElementById("question").innerText=
"ПИТАЊЕ "+(index+1)+" ОД 30: "+questions[index].q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
}

function checkAnswer(){

let user=document.getElementById("answer").value;
if(user.trim()==""){alert("УНЕСИ ОДГОВОР");return;}

let q=questions[index];

if(smartCheck(user,q.a,q.type)){
score++;
document.getElementById("feedback").innerText="ТАЧНО 💖";
hearts();
}else{
wrong++;
document.getElementById("feedback").innerText="НЕТАЧНО ❌";
}

updateStats();

index++;

if(index<30){
setTimeout(show,800);
}else{
finish();
}
}

function hearts(){
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}
}

function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function finish(){

let percent=Math.round((score/30)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="ТЕСТ ЈЕ ЗАВРШЕН!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
"🌸 РЕЗУЛТАТ 🌸<br><br>"+
"ТАЧНО: "+score+" ОД 30<br>"+
"ПРОЦЕНАТ: "+percent+"%<br>"+
"ОЦЕНА: "+grade;
}

</script>

</body>
</html>
