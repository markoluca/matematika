<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТЕСТ 8 – Бројеви прве и друге десетице</title>

<style>
body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
padding:20px;
}

.app{
background:white;
max-width:900px;
width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
padding:30px;
}

h1{text-align:center;}

.question{
margin:15px 0;
padding:10px;
background:#f9f9f9;
border-radius:8px;
}

input{
padding:6px;
font-size:16px;
margin-top:5px;
}

button{
padding:10px 15px;
margin-top:15px;
background:#2c3e50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#eef2f7;
border-radius:8px;
}
</style>
</head>

<body>

<div class="app">

<h1>📚 ТЕСТ 8</h1>

<input id="student" placeholder="Унеси име ученика">
<button onclick="startTest()">Започни тест</button>

<div id="testArea"></div>

<div id="result" class="result"></div>

</div>

<script>
let questions=[];
let answers=[];
let studentName="";

function normalize(text){
return text.toLowerCase()
.replace(/č/g,"ч").replace(/ć/g,"ћ")
.replace(/š/g,"ш").replace(/ž/g,"ж")
.replace(/đ/g,"ђ")
.trim();
}

function startTest(){
studentName=document.getElementById("student").value;
if(!studentName) return alert("Унеси име ученика");

generateQuestions();
renderTest();
}

function generateQuestions(){

questions=[
{q:"1. Напиши цифрама број: деветнаест",a:"19"},
{q:"1. Напиши цифрама број: дванаест",a:"12"},
{q:"1. Напиши цифрама број: осам",a:"8"},
{q:"1. Напиши цифрама број: четрнаест",a:"14"},
{q:"1. Напиши цифрама број: осамнаест",a:"18"},

{q:"2. Који број има 1Д 0Ј?",a:"10"},
{q:"2. Који број има 1Д 1Ј?",a:"11"},
{q:"2. Који број има 1Д 5Ј?",a:"15"},
{q:"2. Који број има 0Д 5Ј?",a:"5"},

{q:"3. Наброј непарне бројеве између 12 и 20 (раздвој запетом)",a:"13,15,17,19"},
{q:"4. Наброј парне бројеве веће од 8 а мање од 18",a:"10,12,14,16"},

{q:"6. Упореди: 18 __ 20",a:"<"},
{q:"6. Упореди: 1Д __ 9Ј",a:">"},
{q:"6. Упореди: 17 __ 1Д 7Ј",a:"="},
{q:"6. Упореди: 2Д __ 1Д 5Ј",a:">"},

{q:"7а. Парни број мањи од 14 а већи од 10",a:"12"},
{q:"7б. Непарни број већи од 13 а мањи од 17",a:"15"},
{q:"7в. Непарни претходник броја 19",a:"17"},
{q:"7г. Парни следбеник броја 19",a:"20"}
];
}

function renderTest(){
let area=document.getElementById("testArea");
area.innerHTML="";

questions.forEach((item,index)=>{
area.innerHTML+=`
<div class="question">
<p>${item.q}</p>
<input id="q${index}">
</div>
`;
});

area.innerHTML+=`<button onclick="finishTest()">Заврши тест</button>`;
}

function finishTest(){
let correct=0;

questions.forEach((item,index)=>{
let user=document.getElementById("q"+index).value;
if(normalize(user)==normalize(item.a)) correct++;
});

let percent=Math.round((correct/questions.length)*100);
let grade=1;

if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("result").innerHTML=
`
<h3>Резултат ученика: ${studentName}</h3>
<p>Тачно: ${correct} од ${questions.length}</p>
<p>Проценат: ${percent}%</p>
<p><strong>Оцена: ${grade}</strong></p>
`;

localStorage.setItem(studentName,JSON.stringify({
correct:correct,
total:questions.length,
percent:percent,
grade:grade
}));
}
</script>

</body>
</html>
