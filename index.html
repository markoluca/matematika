<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 Магична Башта Бројева</title>

<style>
body{
margin:0;
font-family:'Comic Sans MS',cursive;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
display:flex;
justify-content:center;
padding:20px;
overflow-x:hidden;
}

.app{
background:white;
color:#b00020;
max-width:850px;
width:100%;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
padding:30px;
text-align:center;
position:relative;
}

h1{color:#d00000;}

input{
padding:10px;
font-size:18px;
border-radius:15px;
border:2px solid #ff4d6d;
text-align:center;
width:220px;
}

button{
background:#d00000;
color:white;
border:none;
padding:12px 20px;
border-radius:15px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:disabled{background:#ccc;}

.question{
font-size:20px;
margin:20px 0;
min-height:60px;
}

.stats{
margin-top:15px;
background:#ffe5ec;
padding:10px;
border-radius:15px;
}

.progress{
height:15px;
background:#ffd6de;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:15px;
background:#d00000;
width:0%;
transition:0.4s;
}

.result{
margin-top:20px;
font-size:20px;
}

.heart{
position:fixed;
top:-20px;
color:#ff1e56;
font-size:20px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
opacity:0;
}
}
</style>
</head>

<body>

<div class="app">

<h1>👑 Магична Башта Бројева 🌹</h1>

<input id="studentName" placeholder="Унеси своје име">
<br>
<button onclick="startGame()">Почни тест</button>

<div id="gameArea" style="display:none;">
<div class="question" id="question"></div>

<input id="answer">
<br>
<button onclick="nextQuestion()">Провери</button>

<div id="feedback"></div>

<div class="stats">
Тачно: <span id="correctCount">0</span> |
Погрешно: <span id="wrongCount">0</span> |
Проценат: <span id="percent">0</span>%
</div>

<div class="progress">
<div class="bar" id="progressBar"></div>
</div>

<div class="result" id="result"></div>
</div>

</div>

<script>
let allQuestions=[];
let questions=[];
let current=0;
let score=0;
let wrong=0;
let student="";
let lastGroup="";

function normalize(text){
return text.toLowerCase()
.replace(/č/g,"ч").replace(/ć/g,"ћ")
.replace(/š/g,"ш").replace(/ž/g,"ж")
.replace(/đ/g,"ђ")
.trim();
}

function startGame(){
student=document.getElementById("studentName").value;
if(!student) return alert("Унеси име!");

generateQuestions();
shuffleQuestions();
document.getElementById("gameArea").style.display="block";
showQuestion();
}

function generateQuestions(){
allQuestions=[
{g:"cifre",q:"Напиши цифрама број деветнаест",a:"19"},
{g:"cifre",q:"Напиши цифрама број дванаест",a:"12"},
{g:"cifre",q:"Напиши цифрама број осамнаест",a:"18"},
{g:"cifre",q:"Напиши цифрама број четрнаест",a:"14"},

{g:"desetice",q:"Који број има 1Д 0Ј?",a:"10"},
{g:"desetice",q:"Који број има 1Д 5Ј?",a:"15"},
{g:"desetice",q:"Који број има 0Д 5Ј?",a:"5"},
{g:"desetice",q:"Који број има 1Д 1Ј?",a:"11"},

{g:"parni",q:"Наброј парне бројеве прве десетице",a:"2,4,6,8,10"},
{g:"parni",q:"Наброј непарне бројеве друге десетице",a:"11,13,15,17,19"},
{g:"parni",q:"Да ли је 14 паран? (да/не)",a:"да"},
{g:"parni",q:"Да ли је 15 паран? (да/не)",a:"не"},

{g:"uporedi",q:"Упореди 18 __ 20",a:"<"},
{g:"uporedi",q:"Упореди 2Д __ 1Д 5Ј",a:">"},
{g:"uporedi",q:"Упореди 7 + 2 __ 13",a:"<"},
{g:"uporedi",q:"Упореди 17 __ 1Д 7Ј",a:"="},

{g:"racun",q:"Израчунај 10Ј + 6Ј",a:"16"},
{g:"racun",q:"Израчунај 15 - 5",a:"10"},
{g:"racun",q:"Израчунај 8 + 7",a:"15"},
{g:"racun",q:"Израчунај 20 - 9",a:"11"},

{g:"redosled",q:"Допуни: 5, 6, __ , 8",a:"7"},
{g:"redosled",q:"Допуни: 12, 13, __ , 15",a:"14"},
{g:"redosled",q:"Парни број мањи од 14 а већи од 10",a:"12"},
{g:"redosled",q:"Непарни претходник броја 19",a:"17"}
];

questions=[...allQuestions];
}

function shuffleQuestions(){
questions.sort(()=>Math.random()-0.5);
}

function showQuestion(){
document.getElementById("question").innerText=
"Питање "+(current+1)+" од "+questions.length+": "+questions[current].q;
document.getElementById("answer").value="";
document.getElementById("feedback").innerText="";
updateProgress();
}

function nextQuestion(){
let user=normalize(document.getElementById("answer").value);
if(user==""){
alert("Мораш одговорити!");
return;
}

let correctAnswer=normalize(questions[current].a);

if(user==correctAnswer){
score++;
document.getElementById("feedback").innerText="Тачно ✅";
heartsEffect();
}else{
wrong++;
document.getElementById("feedback").innerText="Нетаčno ❌";
}

updateStats();

current++;

if(current<questions.length){
setTimeout(showQuestion,800);
}else{
finishTest();
}
}

function heartsEffect(){
for(let i=0;i<15;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),3000);
}
}

function updateStats(){
document.getElementById("correctCount").innerText=score;
document.getElementById("wrongCount").innerText=wrong;
let percent=Math.round((score/(score+wrong))*100);
document.getElementById("percent").innerText=percent;
}

function updateProgress(){
document.getElementById("progressBar").style.width=
((current/questions.length)*100)+"%";
}

function finishTest(){
let percent=Math.round((score/questions.length)*100);
let grade=1;
if(percent>=90) grade=5;
else if(percent>=75) grade=4;
else if(percent>=60) grade=3;
else if(percent>=40) grade=2;

document.getElementById("question").innerText="Тест је завршен!";
document.getElementById("answer").style.display="none";

document.getElementById("result").innerHTML=
`
🌸 ${student} 🌸<br>
Тачно: ${score} од ${questions.length}<br>
Проценат: ${percent}%<br>
Оцена: ${grade}
`;

localStorage.setItem(student,JSON.stringify({
score:score,
percent:percent,
grade:grade
}));
}
</script>

</body>
</html>
